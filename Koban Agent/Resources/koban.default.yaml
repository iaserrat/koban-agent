# Koban Agent - default configuration.
#
# Koban writes this file to ~/.config/koban/koban.yaml on first launch if it is not already
# there (it never overwrites your edits). Change it there and restart the agent. Anything you
# omit falls back to these built-in defaults (section-level merge), so a partial file is valid.
# Koban only ever reports - it never blocks. See CLAUDE.md.

# Watch timing.
watch:
  # Coalesce FSEvents bursts for this long before rescanning a surface.
  debounceMilliseconds: 800
  # Safety-net rescan of every surface, in case FSEvents drops or coalesces an event.
  pollIntervalSeconds: 300
  # Maximum wall-clock time for one collector snapshot before the surface is marked degraded.
  maxScanWallClockSeconds: 30
  # Maximum age of the last successful scan before the surface is shown as stale.
  maxFreshScanAgeSeconds: 900
  # Bounded project roots used for project-scoped agent and package metadata.
  projectRoots:
    - ~/src
    - ~/Code
    - ~/Developer
    - ~/Projects
  maxDepth: 5
  excludeDirectories:
    - .git
    - node_modules
    - .venv
    - venv
    - __pycache__
    - .tox
    - .mypy_cache
    - .pytest_cache
    - dist
    - build
    - .next
    - .turbo
    - .cache
  # Opt-in targeted scan for known Koban signal names under the home directory.
  homeSignalScan:
    enabled: false
    root: "~"
    maxDepth: 8
    followSymlinks: false
    eventPathFiltering: true
    initialScanBudget:
      maxDirectoriesVisited: 50000
      maxFilesVisited: 250000
      maxWallClockSeconds: 60
    signalFileNames:
      - AGENTS.md
      - CLAUDE.md
      - CLAUDE.local.md
      - .mcp.json
      - .cursorrules
      - opencode.json
      - opencode.jsonc
      - package-lock.json
      - npm-shrinkwrap.json
      - pnpm-lock.yaml
      - yarn.lock
      - bun.lock
      - uv.lock
      - pyproject.toml
      - pylock.toml
    signalFileGlobs:
      - requirements*.txt
      - constraints*.txt
      - "*.rules"
      - "*.mdc"
    pruneDirectoryNames:
      - .git
      - node_modules
      - .venv
      - venv
      - __pycache__
      - .tox
      - .mypy_cache
      - .pytest_cache
      - dist
      - build
      - .next
      - .turbo
      - .cache
      - Library
      - Applications
      - Movies
      - Music
      - Pictures
      - Public
      - Desktop
      - Documents
      - Downloads

# On-disk history retention. Inventory stores current state; event and finding history is bounded.
persistence:
  maxStoredEvents: 5000
  maxStoredFindings: 1000

# Backend sync. Disabled by default so the open-source sensor remains useful without Fleet.
# Humans configure YAML; enrolled devices receive canonical JSON over the open protocol.
sync:
  enabled: false
  protocol: kobanSensorV1
  endpoint: null
  enrollmentToken: null
  # Development-only fallback for JSON sensor auth when Fleet is not requiring mTLS.
  sensorToken: null
  tenantID: null
  deviceID: null
  maxBatchBytes: 524288
  maxBatchEvents: 500
  checkInIntervalSeconds: 60
  retryBaseSeconds: 15
  retryMaxSeconds: 1800
  outboxMaxBytes: 262144000

# Homebrew surface.
homebrew:
  enabled: true
  # Explicit prefixes to scan. Omit (or null) to auto-detect /opt/homebrew and /usr/local.
  prefixes: null

# Claude configuration surface.
claude:
  enabled: true
  # Explicit path to .claude.json. Omit (or null) to use ~/.claude.json.
  configPath: null
  # Project roots for project .mcp.json, .claude/settings.json, commands, skills, and instructions.
  # Null means use watch.projectDiscovery.roots.
  projectRoots: null
  includeProjectMCP: true
  includeSettings: true
  includeAgents: true
  includeCommands: true
  includeHooks: true
  includeSkills: true
  includePlugins: true
  includeInstructions: true
  # Reads /Library/Application Support/ClaudeCode/managed-settings.json only when enabled and readable.
  includeManagedSettings: false

codex:
  enabled: true
  userConfigPath: null
  profileConfigGlob: null
  projectRoots: null
  includeSystemConfig: false
  includeSkills: true
  includeHooks: true
  includeRules: true

pi:
  enabled: true
  agentDirectory: null
  includeSharedGlobalMCP: true
  includeSharedProjectMCP: true
  includePiGlobalOverride: true
  includePiProjectOverride: true
  includePackages: true
  includeImports: true

cursor:
  enabled: true
  globalMCPPath: null
  includeGlobalMCP: true
  includeProjectMCP: true
  includeRules: true
  includeLegacyRules: true
  includeInstructions: true

opencode:
  enabled: true
  userConfigDirectory: null
  projectRoots: null
  includeGlobal: true
  includeProject: true
  includeMCP: true
  includeAgents: true
  includeCommands: true
  includePlugins: true
  includeInstructions: true
  includeManagedPreferences: false

javascript:
  enabled: true
  projectRoots: null
  maxDepth: null
  includeNpm: true
  includePnpm: true
  includeYarn: true
  includeBun: true
  excludeDirectories: null
  lockfileNames:
    - package-lock.json
    - npm-shrinkwrap.json
    - pnpm-lock.yaml
    - yarn.lock
    - bun.lock

python:
  enabled: true
  projectRoots: null
  maxDepth: null
  includeUV: true
  includePyProject: true
  includeRequirements: true
  includePylock: true
  excludeDirectories: null
  requirementFileGlobs:
    - requirements*.txt
    - constraints*.txt

# Heuristic ruleset. Each rule raises a finding when an item on `surface` changes in a way
