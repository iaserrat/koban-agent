# Koban Agent - SwiftLint configuration.
# Policy: zero violations. CI and the Xcode build phase run `swiftlint lint --strict`,
# so every warning is a failure. Opt-in rules are enabled deliberately, never blanket -
# see CLAUDE.md.

only_rules: []

# Directories SwiftLint should never look at.
excluded:
  - .build
  - DerivedData
  - "**/*.generated.swift"

# Opt-in rules. Curated rather than auto-enabled so each one is an intentional choice.
opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_assert
  - discouraged_none_name
  - discouraged_object_literal
  - empty_collection_literal
  # Intentionally NOT enabled, each conflicts with deliberate domain modeling:
  #   discouraged_optional_boolean   - Provenance.installedOnRequest is genuinely tri-state
  #                                    (true / false / "surface has no such concept").
  #   discouraged_optional_collection - config overrides use nil to mean "auto-detect",
  #                                     which is distinct from an empty list.
  #   conditional_returns_on_newline - fights idiomatic single-line `guard ... else { return }`.
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - local_doc_comment
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - nimble_operator
  - no_extension_access_modifier
  - no_magic_numbers
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - private_subject
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - shorthand_optional_binding
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - weak_delegate
  - yoda_condition

# Analyzer rules (run via `swiftlint analyze`, see `make analyze`).
analyzer_rules:
  - unused_declaration
  - unused_import

# `no_magic_numbers` enforces the "constants over magic values" rule for numbers.
# 0/1 and array indices are allowed; everything else belongs in Constants/.
no_magic_numbers:
  test_parent_classes: []

force_unwrapping: error
implicitly_unwrapped_optional: error

# Records.swift intentionally gathers the GRDB conformances for several domain types in one
# place (so Model/ stays persistence-free); no single type name can match the file.
file_name:
  excluded:
    - Records.swift

# Tight metrics enforce the small-file / small-type discipline from CLAUDE.md.
file_length:
  warning: 250
  error: 400
type_body_length:
  warning: 150
  error: 250
function_body_length:
  warning: 40
  error: 60
function_parameter_count:
  warning: 5
  error: 6
cyclomatic_complexity:
  warning: 8
  error: 12
type_name:
  min_length: 3
  max_length: 45
identifier_name:
  min_length: 2
  excluded: [id, db, to, x, y, ok]
line_length:
  warning: 110
  error: 140
  ignores_comments: true
  ignores_urls: true

# House style: em dashes are banned in comments and copy (see CLAUDE.md). Use a hyphen,
# comma, colon, or rephrase.
custom_rules:
  no_em_dash:
    name: "Em Dash"
    regex: "—"
    message: "Em dashes are not allowed in comments or copy. Use a hyphen, comma, or rephrase."
    severity: error
